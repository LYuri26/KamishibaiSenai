<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios Consolidados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/geral.css">
    <link rel="stylesheet" href="../assets/css/administrador/relatorios.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container mt-5">
        <h2><i class="fas fa-chart-pie me-2"></i>Relatórios Consolidados</h2>
        <div class="mb-3">
            <label for="filtroData" class="form-label">Filtrar por data:</label>
            <input type="date" id="filtroData" class="form-control w-auto d-inline-block">
            <button id="btnFiltrar" class="btn btn-primary ms-2">Filtrar</button>
            <a href="index.html" class="btn btn-secondary ms-2"><i class="fas fa-arrow-left me-1"></i>Voltar</a>
        </div>
        <div id="relatoriosContainer">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Carregando...</span>
                </div>
                <p>Carregando relatórios...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/administrador/relatorios.js"></script>
</body>

</html>
