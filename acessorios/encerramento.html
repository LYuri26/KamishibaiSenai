<head>

    <!-- Bootstrap 5 + Ícones -->

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="../assets/css/geral.css">
    <link rel="stylesheet" href="../assets/css/acessorios/acessorios.css">
</head>

<body class="bg-light">
    <div id="header"></div>

    <div class="container d-flex justify-content-end mt-3">
        <a href="../acesso/api/logout.php" class="btn btn-outline-danger btn-sm rounded-pill">
            <i class="bi bi-box-arrow-right me-1"></i>Sair
        </a>
    </div>

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="bg-white rounded-4 shadow-sm p-5 text-center mt-5">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
                    <h2 class="mt-4 fw-bold">Inspeção Finalizada!</h2>
                    <p class="text-muted mb-4">Obrigado por realizar a inspeção. Os dados foram registrados com sucesso.
                    </p>
                    <div class="d-flex justify-content-center gap-3">
                        <a href="../index.html" class="btn btn-primary rounded-pill px-4">
                            <i class="bi bi-house-door me-1"></i>Página Inicial
                        </a>
                        <a href="../acesso/api/logout.php" class="btn btn-outline-secondary rounded-pill px-4">
                            <i class="bi bi-box-arrow-right me-1"></i>Sair
                        </a>
                    </div>
                    <p class="mt-4 small text-muted">Você será redirecionado em <span id="contador">10</span>
                        segundos...</p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/acessorios/componentes.js"></script>
    <script>
        // Redirecionamento automático após 10 segundos
        let segundos = 10;
        const contadorEl = document.getElementById('contador');
        const intervalo = setInterval(() => {
            segundos--;
            contadorEl.textContent = segundos;
            if (segundos <= 0) {
                clearInterval(intervalo);
                window.location.href = '../index.html';
            }
        }, 1000);
    </script>
</body>

</html>
