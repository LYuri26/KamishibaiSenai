on:
  push:
    branches:
      - release
name: 🚀 Deploy Release on push
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: 82.25.72.215
          port: 21
          protocol: ftps                # Força FTPS (explícito)
          username: ${{ secrets.USER }}
          password: '${{ secrets.PASSWORD }}'   # Aspas simples para caracteres especiais
          server-dir: /public_html/kamishibai/   # Caminho correto
          exclude: |
            **/.git*
            **/.git*/**
            **/.vscode/**
            _documents/**
            _phpinfo.php
            *.code-workspace
            *.bkp
            *.zip
            _test.html
            _data/database/release.ini
            mergeRelease.cmd
            .env
            .github/**