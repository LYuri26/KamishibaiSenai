<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamishibai SENAI - Sala 104a</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/geral.css">
    <link rel="stylesheet" href="../assets/css/ambiente/sala104a.css">
</head>

<body>
    <div class="container checklist-container">
        <h2 class="text-center mb-4">Inspeção da Sala 104a</h2>

        <div class="progress mb-4">
            <div class="progress-bar" role="progressbar" style="width: 0%;" id="progressBar">0%</div>
        </div>

        <form id="checklistForm">
            <div class="instrutor-input">
                <label for="nome" class="form-label">Nome do Instrutor</label>
                <input type="text" class="form-control" id="nome" name="nome" required
                    placeholder="Digite seu nome completo">
            </div>

            <div id="questionsContainer"></div>

            <div class="navigation-buttons">
                <button type="button" id="prevBtn" class="btn btn-secondary" disabled>Anterior</button>
                <button type="button" id="nextBtn" class="btn btn-primary">Próximo</button>
                <button type="submit" id="submitBtn" class="btn btn-success d-none">Finalizar Inspeção</button>
            </div>
        </form>

        <div id="mensagem" class="mt-3"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/ambiente/sala104a.js"></script>
</body>

</html>
